service: oura-health

frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'dev'}
  timeout: 30
  memorySize: 512
  
  environment:
    NODE_ENV: production
    AWS_STAGE: ${self:provider.stage}
    OURA_ACCESS_TOKEN: ${env:OURA_ACCESS_TOKEN}
    OURA_REFRESH_TOKEN: ${env:OURA_REFRESH_TOKEN, ''}
    OURA_CLIENT_ID: ${env:OURA_CLIENT_ID, ''}
    OURA_CLIENT_SECRET: ${env:OURA_CLIENT_SECRET, ''}
    OURA_WEBHOOK_VERIFICATION_TOKEN: ${env:OURA_WEBHOOK_VERIFICATION_TOKEN, ''}
    OURA_WEBHOOK_QUEUE_URL:
      Ref: OuraWebhookQueue
    OURA_WEBHOOK_REPLAY_TABLE:
      Ref: OuraWebhookReplayTable
    OURA_EXPORT_STATE_TABLE:
      Ref: OuraExportStateTable
    OURA_TOKEN_PERSISTENCE: aws-ssm
    OURA_ACCESS_TOKEN_PARAMETER: /oura-health/${self:provider.stage}/oura/access-token
    OURA_REFRESH_TOKEN_PARAMETER: /oura-health/${self:provider.stage}/oura/refresh-token
    SPOTIFY_CLIENT_ID: ${env:SPOTIFY_CLIENT_ID}
    SPOTIFY_CLIENT_SECRET: ${env:SPOTIFY_CLIENT_SECRET}
    SPOTIFY_ACCESS_TOKEN: ${env:SPOTIFY_ACCESS_TOKEN}
    SPOTIFY_REFRESH_TOKEN: ${env:SPOTIFY_REFRESH_TOKEN}
    SPOTIFY_TOKEN_PERSISTENCE: aws-ssm
    SPOTIFY_ACCESS_TOKEN_PARAMETER: /oura-health/${self:provider.stage}/spotify/access-token
    SPOTIFY_REFRESH_TOKEN_PARAMETER: /oura-health/${self:provider.stage}/spotify/refresh-token
    SPOTIFY_ENABLED: ${env:SPOTIFY_ENABLED, 'true'}
    PLAYLIST_GENERATION_STATE_TABLE:
      Ref: PlaylistGenerationStateTable
    GOVEE_API_KEY: ${env:GOVEE_API_KEY, ''}
    LIGHTING_ENABLED: ${env:LIGHTING_ENABLED, 'true'}
    ALEXA_SKILL_ID: ${env:ALEXA_SKILL_ID, ''}
    GOOGLE_OURA_DOCUMENT_ID: ${env:GOOGLE_OURA_DOCUMENT_ID, ''}
    GOOGLE_SERVICE_ACCOUNT_EMAIL: ${env:GOOGLE_SERVICE_ACCOUNT_EMAIL, ''}
    GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY: ${env:GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY, ''}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            Fn::GetAtt:
              - OuraWebhookQueue
              - Arn
        - Effect: Allow
          Action:
            - dynamodb:PutItem
          Resource:
            Fn::GetAtt:
              - OuraWebhookReplayTable
              - Arn
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
            - dynamodb:GetItem
          Resource:
            Fn::GetAtt:
              - OuraExportStateTable
              - Arn
        - Effect: Allow
          Action:
            - dynamodb:UpdateItem
            - dynamodb:GetItem
          Resource:
            Fn::GetAtt:
              - PlaylistGenerationStateTable
              - Arn
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:PutParameter
          Resource:
            Fn::Join:
              - ''
              - - 'arn:aws:ssm:'
                - Ref: AWS::Region
                - ':'
                - Ref: AWS::AccountId
                - ':parameter/oura-health/${self:provider.stage}/*'
        - Effect: Allow
          Action:
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
          Resource:
            Fn::GetAtt:
              - OuraWebhookQueue
              - Arn

functions:
  # Alexa Skill endpoint
  alexa:
    handler: dist/lambda/index.alexaHandler
    events:
      - http:
          path: /alexa
          method: post
          cors: true

  ouraWebhookVerification:
    handler: dist/lambda/index.ouraWebhookVerification
    timeout: 10
    events:
      - http:
          path: /oura-webhook
          method: get

  ouraWebhookReceiver:
    handler: dist/lambda/index.ouraWebhookReceiver
    timeout: 10
    events:
      - http:
          path: /oura-webhook
          method: post

  ouraWebhookProcessor:
    handler: dist/lambda/index.processOuraWebhook
    events:
      - sqs:
          arn:
            Fn::GetAtt:
              - OuraWebhookQueue
              - Arn
          batchSize: 1

  # Repairs incomplete or missed daily exports. Runs once per day at 15:15 UTC.
  ouraExportReconciliation:
    handler: dist/lambda/index.reconcileOuraExports
    timeout: 120
    events:
      - schedule:
          rate: cron(15 15 * * ? *)
          enabled: true
          description: Reconcile recent Oura daily exports

  # EventBridge cron is UTC. Each automation uses both Eastern UTC offsets and
  # the handler filters the extra invocation in America/New_York for DST safety.
  # Morning automation - executes at 7:00 AM Eastern daily
  morningAutomation:
    handler: dist/lambda/index.scheduledMorningAutomation
    events:
      - schedule:
          rate: cron(0 11,12 * * ? *)
          enabled: true
          description: Morning automation based on Oura scores

  # Playlist generation - executes at 7:45 AM Eastern daily
  playlistGeneration:
    handler: dist/lambda/index.scheduledPlaylistGeneration
    events:
      - schedule:
          rate: cron(45 11,12 * * ? *)
          enabled: true
          description: Generate daily Spotify playlist

  # Playlist retry - executes hourly from 8 AM to 1 PM Eastern
  playlistRetry:
    handler: dist/lambda/index.scheduledPlaylistRetry
    events:
      - schedule:
          rate: cron(0 12-18 * * ? *)
          enabled: true
          description: Retry playlist generation if data not fresh

  # Evening wind-down - executes at 9:00 PM Eastern daily
  eveningWindDown:
    handler: dist/lambda/index.scheduledEveningWindDown
    events:
      - schedule:
          rate: cron(0 1,2 * * ? *)
          enabled: true
          description: Evening wind-down lighting

package:
  patterns:
    - '!src/**'
    - '!*.md'
    - '!docs/**'
    - '!scripts/**'
    - '!*.json'
    - '!*.yml'
    - '!*.yaml'
    - '!.git/**'
    - '!.env*'
    - 'dist/**'
    - 'dist/config/**'
    - 'node_modules/**'

resources:
  Resources:
    OuraWebhookQueue:
      Type: AWS::SQS::Queue
      Properties:
        VisibilityTimeout: 120
        MessageRetentionPeriod: 1209600
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt:
              - OuraWebhookDeadLetterQueue
              - Arn
          maxReceiveCount: 5
    OuraWebhookDeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        MessageRetentionPeriod: 1209600
    OuraWebhookReplayTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: eventId
            AttributeType: S
        KeySchema:
          - AttributeName: eventId
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
    OuraExportStateTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: date
            AttributeType: S
        KeySchema:
          - AttributeName: date
            KeyType: HASH
    PlaylistGenerationStateTable:
      Type: AWS::DynamoDB::Table
      Properties:
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: date
            AttributeType: S
        KeySchema:
          - AttributeName: date
            KeyType: HASH
    OuraHealthLogGroup:
      Type: AWS::Logs::LogGroup
      Properties:
        LogGroupName: /aws/lambda/oura-health-${self:provider.stage}
        RetentionInDays: 14
